---
name: molecule test
on:
  pull_request:
  push:
  schedule:
    - cron: "15 6 * * 1"
jobs:
  molecule:
    name: ansible
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - latest
          - pinned
          - legacy
        distro:
          - debian13
          - debian12
        include:
          - ansible: latest
            pip3deps: '"ansible>=13" "ansible-core>=2.20" molecule "molecule-plugins[docker]" yamllint ansible-lint requests==2.31.0'
          - ansible: pinned
            pip3deps: '"ansible==11.13.0" "ansible-core==2.18.15" "molecule-plugins[docker]" "yamllint==1.38.0" "ansible-lint==26.4.0"'
          - ansible: legacy
            pip3deps: '"ansible==2.9.27" "molecule[docker,lint]==3.2.3" "yamllint==1.24.2" "ansible-lint==4.2.0" "requests<2.29" "urllib3<2"'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.13.5

      - name: Install test dependencies.
        run: pip3 install ${{ matrix.pip3deps }}

      - name: Install collections required on ansible 2.9
        run: ansible-galaxy collection install community.general
        if: ${{ matrix.ansible == 'legacy' }}

      - name: run molecule tests
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
