---
hiyapyco_remove_aptrepos:
  - repo: deb http://repo.zero-sys.net/hiyapyco/deb ./

hiyapyco_aptrepos:
  - repo: deb [signed-by=/usr/share/keyrings/hiyapyco.asc] http://repo.zero-sys.net/hiyapyco/deb ./
    key: hiyapyco.asc

hiyapyco_packages:
  - python3-hiyapyco

# use the original debian package by default
hiyapyco_use_original_deb_packages: "{{ ((ansible_distribution_major_version | int) > 12) and (ansible_distribution.lower() == 'debian') }}"
